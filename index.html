<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Flashcard Drill</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18",
    "react-dom/client": "https://esm.sh/react-dom@18/client",
    "lucide-react": "https://esm.sh/lucide-react@0.383.0?external=react",
    "katex": "https://esm.sh/katex@0.16.9",
    "marked": "https://esm.sh/marked@12.0.0"
  }
}
</script>
</head>
<body>
<div id="root"></div>
<script>
  // window.storage shim — the app calls window.storage.get/set(key, false)
  // to persist decks, cards, notes, settings, and the Google sign-in hint.
  // That API is built into Claude.ai's artifact preview but does NOT exist
  // on a plain static host, so every read/write was silently failing and
  // nothing survived closing the tab. This backs it with localStorage so it
  // actually persists (per browser/device). Must run before the module
  // script below, since it's a synchronous classic script.
  (function () {
    var PREFIX = 'flashdrill_storage:';
    function fullKey(key, shared) { return PREFIX + (shared ? 'shared:' : 'priv:') + key; }
    window.storage = {
      get: function (key, shared) {
        return new Promise(function (resolve, reject) {
          try {
            var raw = localStorage.getItem(fullKey(key, shared));
            if (raw === null) { reject(new Error('key not found')); return; }
            resolve({ key: key, value: raw, shared: !!shared });
          } catch (e) { reject(e); }
        });
      },
      set: function (key, value, shared) {
        return new Promise(function (resolve, reject) {
          try {
            localStorage.setItem(fullKey(key, shared), value);
            resolve({ key: key, value: value, shared: !!shared });
          } catch (e) { reject(e); }
        });
      },
      delete: function (key, shared) {
        return new Promise(function (resolve, reject) {
          try {
            localStorage.removeItem(fullKey(key, shared));
            resolve({ key: key, deleted: true, shared: !!shared });
          } catch (e) { reject(e); }
        });
      },
      list: function (prefix, shared) {
        return new Promise(function (resolve, reject) {
          try {
            var base = PREFIX + (shared ? 'shared:' : 'priv:');
            var match = base + (prefix || '');
            var keys = [];
            for (var i = 0; i < localStorage.length; i++) {
              var lk = localStorage.key(i);
              if (lk && lk.indexOf(match) === 0) keys.push(lk.slice(base.length));
            }
            resolve({ keys: keys, prefix: prefix, shared: !!shared });
          } catch (e) { reject(e); }
        });
      }
    };
  })();
</script>
<script type="module">
  import React from 'react';
  import { createRoot } from 'react-dom/client';
  import FlashcardDrillApp from './FlashcardDrill.compiled.js';
  createRoot(document.getElementById('root')).render(React.createElement(FlashcardDrillApp));
</script>
</body>
</html>
